<!doctype html>
<html lang="id" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Lampu Ruang Kelas</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{font-family:'Plus Jakarta Sans',sans-serif;}
body{background:#0f1729;color:white;text-align:center;padding:40px}
button{padding:10px 20px;border-radius:10px;margin:5px;cursor:pointer}
</style>
</head>

<body>

<!-- OPENING -->
<div id="opening-screen">
  <h1>Simulasi Energi Listrik</h1>
  <p>Pilih Mode Simulasi</p>

  <!-- FITUR BARU -->
  <button onclick="selectMode('manual')" style="background:#63b3ed;">Mode Manual</button>
  <button onclick="selectMode('auto')" style="background:#48bb78;">Mode Sensor Otomatis</button>
</div>

<!-- APP -->
<div id="app-wrapper" style="display:none">

<h2 id="mode-text"></h2>

<!-- SENSOR BUTTON -->
<button id="sensor-btn" onclick="triggerSensor()" style="display:none;background:#48bb78;">
  Gerakkan Objek (Sensor)
</button>

<hr>

<!-- LAMPU -->
<div id="lamp-container"></div>

<h3 id="total"></h3>

</div>

<script>

// ================= DATA =================
const TARIFF = 1444.70;
const DAYS = 30;

let mode = "manual";

const lamps = [
  {name:"Lampu 1", power:40, hours:8, on:true},
  {name:"Lampu 2", power:40, hours:8, on:true},
  {name:"Lampu 3", power:40, hours:6, on:true},
  {name:"Lampu 4", power:40, hours:6, on:false}
];

// ================= MODE =================
function selectMode(m){
  mode = m;
  startSimulation();
}

function startSimulation(){
  document.getElementById("opening-screen").style.display="none";
  document.getElementById("app-wrapper").style.display="block";

  if(mode==="manual"){
    document.getElementById("mode-text").innerText="Mode Manual";
    document.getElementById("sensor-btn").style.display="none";
  }else{
    document.getElementById("mode-text").innerText="Mode Sensor Otomatis";
    document.getElementById("sensor-btn").style.display="block";
  }

  renderLamp();
}

// ================= LAMPU =================
function renderLamp(){
  const container = document.getElementById("lamp-container");
  container.innerHTML="";

  lamps.forEach((lamp,i)=>{
    const div = document.createElement("div");

    div.innerHTML = `
      <p>${lamp.name} - ${lamp.on ? "ON" : "OFF"}</p>
      <button onclick="toggleLamp(${i})">Toggle</button>
    `;

    container.appendChild(div);
  });

  hitung();
}

function toggleLamp(i){
  lamps[i].on = !lamps[i].on;
  renderLamp();
}

// ================= SENSOR =================
function triggerSensor(){
  // semua nyala
  lamps.forEach(l=>l.on=true);
  renderLamp();

  // mati otomatis
  setTimeout(()=>{
    lamps.forEach(l=>l.on=false);
    renderLamp();
  },3000);
}

// ================= HITUNG =================
function hitung(){
  let total=0;

  lamps.forEach(l=>{
    if(l.on){
      total += (l.power*l.hours*DAYS/1000)*TARIFF;
    }
  });

  document.getElementById("total").innerText =
    "Total Biaya: Rp " + total.toFixed(0);
}

</script>

</body>
</html>
